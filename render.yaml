services:
  - type: web
    name: agentic-ai-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn fastapi_wrapper:app --host 0.0.0.0 --port 10000
    envVars:
      - key: GROQ_API_KEY
        sync: false   # Render will ask for the value in the dashboard
